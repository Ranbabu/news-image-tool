<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan News Tech - Live Images</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background-color: #f4f4f4; }
        input { width: 90%; padding: 12px; font-size: 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { padding: 12px 25px; font-size: 16px; background-color: #d32f2f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #image-container { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; gap: 15px; }
        img { max-width: 100%; width: 320px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); object-fit: cover; }
    </style>
</head>
<body>

    <h2>ताज़ा न्यूज़ तस्वीरें खोजें</h2>
    <input type="text" id="newsHeadline" placeholder="हिंदी न्यूज़ हेडलाइन डालें (जैसे: मोदी लाइव सभा)">
    <button onclick="fetchImages()">इमेज खोजें</button>

    <div id="image-container"></div>

    <script>
        async function fetchImages() {
            let headline = document.getElementById("newsHeadline").value;
            let container = document.getElementById("image-container");
            container.innerHTML = "इमेज खोजी जा रही हैं, कृपया प्रतीक्षा करें...";

            if(!headline) {
                container.innerHTML = "कृपया कोई न्यूज़ हेडलाइन डालें!";
                return;
            }

            // यहाँ अपना Vercel वाला लाइव URL डालें
            let apiUrl = `https://आपके-प्रोजेक्ट-का-नाम.vercel.app/get_image?query=${encodeURIComponent(headline)}`;

            try {
                let response = await fetch(apiUrl);
                let data = await response.json();

                container.innerHTML = ""; 

                if(data.images && data.images.length > 0) {
                    data.images.forEach(imageUrl => {
                        let imgTag = document.createElement("img");
                        imgTag.src = imageUrl;
                        container.appendChild(imgTag);
                    });
                } else {
                    container.innerHTML = "इस हेडलाइन से जुड़ी कोई इमेज नहीं मिली।";
                }
            } catch (error) {
                container.innerHTML = "सर्वर से कनेक्ट करने में त्रुटि आई।";
                console.error(error);
            }
        }
    </script>

</body>
</html>
