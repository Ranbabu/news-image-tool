<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan News Tech - Google Images</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background-color: #f4f4f4; }
        input { width: 90%; padding: 12px; font-size: 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { padding: 12px 25px; font-size: 16px; background-color: #d32f2f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #image-container { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; gap: 15px; }
        img { max-width: 100%; width: 320px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); object-fit: cover; }
        .error { color: red; font-weight: bold; margin-top: 15px;}
    </style>
</head>
<body>

    <h2>आर्यन न्यूज़ टेक - गूगल तस्वीरें</h2>
    <input type="text" id="newsHeadline" placeholder="हिंदी या इंग्लिश में न्यूज़ हेडलाइन डालें">
    <button onclick="fetchImages()">इमेज खोजें</button>

    <div id="image-container"></div>

    <script>
        async function fetchImages() {
            let headline = document.getElementById("newsHeadline").value;
            let container = document.getElementById("image-container");
            
            if(!headline) {
                container.innerHTML = "<p class='error'>कृपया कोई न्यूज़ हेडलाइन डालें!</p>";
                return;
            }

            container.innerHTML = "<p>गूगल से इमेजेस खोजी जा रही हैं, कृपया प्रतीक्षा करें...</p>";

            // ज़रूरी: यहाँ "आपका-लाइव-लिंक" की जगह अपना Vercel URL डालें (https:// के साथ)
            let apiUrl = `आपका-लाइव-लिंक/api/search?q=${encodeURIComponent(headline)}`;

            try {
                let response = await fetch(apiUrl);
                let data = await response.json();

                container.innerHTML = ""; 

                if(data.error) {
                    container.innerHTML = `<p class='error'>${data.error}</p>`;
                    return;
                }

                if(data.results && data.results.length > 0) {
                    data.results.forEach(item => {
                        let imgTag = document.createElement("img");
                        imgTag.src = item.image; 
                        container.appendChild(imgTag);
                    });
                } else {
                    container.innerHTML = "<p class='error'>इस हेडलाइन से जुड़ी कोई इमेज नहीं मिली।</p>";
                }
            } catch (error) {
                container.innerHTML = "<p class='error'>सर्वर से कनेक्ट करने में त्रुटि आई।</p>";
                console.error(error);
            }
        }
    </script>

</body>
</html>
